<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Al Hammadi Hospitals – App Features Tracking System</title>
<style>
:root{
  --primary:#1855A4;--secondary:#7499C8;--accent:#3B7DC4;--primary-dark:#12326A;
  --primary-soft:#EAF1FB;--primary-tint:#DCE8F8;
  --bg:#F5F7FB;--card:#FFFFFF;--border:#D9E2F1;--text:#1F2937;--muted:#6B7280;
  --success:#22C55E;--warning:#F59E0B;--danger:#DC2626;--neutral:#64748B;
  --success-bg:#F0FDF4;--warning-bg:#FFFBEB;--danger-bg:#FEF2F2;--neutral-bg:#F1F5F9;
  --grad:linear-gradient(135deg,#1855A4 0%,#3B7DC4 100%);
  --bar:linear-gradient(90deg,#1855A4,#3B7DC4);
  --shadow-xs:0 1px 2px rgba(24,85,164,.05),0 1px 3px rgba(24,85,164,.06);
  --shadow-sm:0 2px 4px rgba(24,85,164,.05),0 6px 16px rgba(24,85,164,.06);
  --shadow-md:0 4px 10px rgba(24,85,164,.06),0 14px 30px rgba(24,85,164,.08);
  --shadow-lg:0 10px 20px rgba(24,85,164,.07),0 28px 64px rgba(15,23,42,.12);
  --glow-green:0 0 0 1px rgba(34,197,94,.35),0 10px 30px rgba(34,197,94,.18);
  --ease:cubic-bezier(.4,0,.2,1);--ease-out:cubic-bezier(.16,1,.3,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
  --t-fast:200ms;--t:280ms;--t-slow:340ms;
  --topbar-h:74px;--sidebar-w:264px;
  --r-sm:12px;--r-md:14px;--r-lg:18px;--r-xl:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;color:var(--text);font-size:13px;overflow-x:hidden;font-family:'Inter','Segoe UI',Tahoma,sans-serif;-webkit-font-smoothing:antialiased;
  background:radial-gradient(circle at 12% -8%,rgba(24,85,164,.10),transparent 40%),radial-gradient(circle at 92% 0%,rgba(59,125,196,.07),transparent 34%),linear-gradient(180deg,#F8FAFE 0%,var(--bg) 52%,#EEF3FB 100%);background-attachment:fixed}
body.ar{direction:rtl;font-family:'Sakkal Majalla','Segoe UI',Tahoma,sans-serif}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:0;background:none}
svg{display:block;flex:0 0 auto}
.icon{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-sm{width:15px;height:15px}
#app{transition:opacity var(--t) var(--ease)}
#app.lang-fade{opacity:0}
::selection{background:rgba(24,85,164,.18)}
.rippleable{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;transform:scale(0);background:currentColor;opacity:.2;pointer-events:none;animation:ripple .55s var(--ease-out) forwards}
@keyframes ripple{to{transform:scale(2.4);opacity:0}}

/* top nav */
.top-nav{position:sticky;top:0;height:var(--topbar-h);z-index:80;background:rgba(255,255,255,.74);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid rgba(217,226,241,.8);display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 4px 20px rgba(24,85,164,.04)}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.logo-mark{width:54px;height:54px;border-radius:16px;background:#fff;border:1px solid var(--border);box-shadow:0 6px 18px rgba(24,85,164,.12);display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:7px}
.logo-mark img{width:100%;height:100%;object-fit:contain;display:block}
.brand h1{font-size:14.5px;font-weight:850;letter-spacing:-.01em;color:var(--primary-dark);line-height:1.2}
.main-tabs{display:flex;align-items:center;gap:5px;background:rgba(248,250,254,.85);border:1px solid var(--border);border-radius:15px;padding:5px}
.tab-btn{color:var(--muted);padding:9px 14px;border-radius:11px;font-size:12px;font-weight:750;display:flex;gap:7px;align-items:center;transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease),transform var(--t-fast) var(--ease)}
.tab-btn:hover{background:#fff;color:var(--primary)}
.tab-btn:active{transform:scale(.97)}
.tab-btn.active{background:var(--grad);color:#fff;box-shadow:0 8px 20px rgba(24,85,164,.24)}
.nav-actions{display:flex;align-items:center;gap:8px}
.cmd-hint{display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:rgba(255,255,255,.7);border-radius:12px;padding:9px 12px;color:var(--muted);font-weight:700;font-size:12px;transition:all var(--t-fast) var(--ease)}
.cmd-hint:hover{border-color:var(--secondary);color:var(--primary);transform:translateY(-1px)}
.cmd-hint kbd{background:var(--primary-soft);border:1px solid var(--primary-tint);border-radius:6px;padding:1px 6px;font-size:10px;font-weight:800;color:var(--primary);font-family:ui-monospace,Menlo,monospace}
.icon-btn{border:1px solid var(--border);background:rgba(255,255,255,.7);border-radius:12px;padding:9px 13px;color:var(--text);font-weight:750;font-size:12px;display:flex;align-items:center;gap:7px;transition:all var(--t-fast) var(--ease);white-space:nowrap}
.icon-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);border-color:var(--secondary)}
.icon-btn:active{transform:translateY(0) scale(.98)}
.primary-btn{background:var(--grad);border:0;color:#fff;border-radius:12px;padding:10px 15px;font-weight:800;font-size:12px;display:flex;align-items:center;gap:8px;box-shadow:0 10px 24px rgba(24,85,164,.24);transition:all var(--t-fast) var(--ease)}
.primary-btn:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(24,85,164,.30)}
.primary-btn:active{transform:translateY(0) scale(.98)}

/* layout */
.layout{display:grid;grid-template-columns:var(--sidebar-w) minmax(0,1fr);gap:24px;padding:24px 26px}
.category-sidebar{position:sticky;top:calc(var(--topbar-h) + 24px);align-self:start;height:calc(100vh - var(--topbar-h) - 48px);background:linear-gradient(180deg,#0E2547,#12326A);border-radius:var(--r-xl);color:#fff;padding:18px;box-shadow:0 24px 60px rgba(15,23,42,.22);overflow:hidden;display:flex;flex-direction:column}
.category-sidebar::before{content:"";position:absolute;inset:-80px -80px auto auto;width:170px;height:170px;border-radius:50%;background:rgba(59,125,196,.22)}
.side-head{position:relative;z-index:1;display:flex;align-items:center;gap:9px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(148,163,184,.18)}
.side-head .icon{color:var(--secondary)}
.side-title{font-size:12.5px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#CBD5E1}
.cat-list{position:relative;z-index:1;display:flex;flex-direction:column;gap:6px;overflow:auto;padding-inline-end:2px}
.cat-list::-webkit-scrollbar{width:6px}.cat-list::-webkit-scrollbar-thumb{background:rgba(148,163,184,.3);border-radius:8px}
.cat-btn{color:#CBD5E1;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border-radius:13px;transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);font-size:12px;text-align:inherit;width:100%;opacity:0;animation:slideStagger .4s var(--ease-out) forwards}
@keyframes slideStagger{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cat-btn:hover{background:rgba(255,255,255,.08);color:#fff;transform:translateX(3px)}
body.ar .cat-btn:hover{transform:translateX(-3px)}
.cat-btn.active{background:linear-gradient(135deg,rgba(59,125,196,.34),rgba(116,153,200,.16));color:#fff;box-shadow:inset 0 0 0 1px rgba(116,153,200,.3)}
.cat-left{display:flex;align-items:center;gap:9px;min-width:0}
.cat-dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto;box-shadow:0 0 0 3px color-mix(in srgb,var(--dot) 22%,transparent)}
.cat-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:750}
.cat-count{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);min-width:26px;text-align:center;padding:2px 7px;border-radius:999px;font-size:10px;color:#E2E8F0}

.content{min-width:0}
.view{display:none}
.view.active{display:block;animation:fadeUp var(--t-slow) var(--ease-out) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* sections */
.report-dashboard{display:flex;flex-direction:column;gap:22px}
.report-section{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);overflow:hidden;position:relative;animation:fadeUp var(--t-slow) var(--ease-out) both}
.report-section::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:var(--bar)}
.report-section-head{display:flex;align-items:center;gap:12px;padding:22px 24px 6px}
.section-ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(24,85,164,.12)}
.report-title{font-size:18px;font-weight:900;color:var(--primary-dark);letter-spacing:-.02em}
.report-meta{margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.meta-chip{border:1px solid var(--primary-tint);background:#F8FAFE;color:var(--neutral);border-radius:999px;padding:8px 12px;font-size:11px;font-weight:750;white-space:nowrap;display:flex;align-items:center;gap:6px}
.meta-chip .icon{color:var(--primary)}
.section-body{padding:16px 24px 24px}

/* KPI status cards (% only) */
.status-card-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:16px}
.status-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;min-height:148px;transition:transform var(--t) var(--ease-out),box-shadow var(--t) var(--ease-out),border-color var(--t) var(--ease);opacity:0;animation:fadeUp var(--t-slow) var(--ease-out) forwards;will-change:transform}
.status-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md);border-color:color-mix(in srgb,var(--status-color) 40%,var(--border))}
.status-card::before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:var(--status-color)}
.status-card.highlight{transform:scale(1.025);border-color:color-mix(in srgb,var(--success) 45%,var(--border));box-shadow:var(--glow-green)}
.status-card.highlight:hover{transform:scale(1.025) translateY(-4px)}
.status-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
.status-label{font-size:12px;font-weight:850;color:var(--text);line-height:1.3}
.status-dot{width:12px;height:12px;border-radius:999px;background:var(--status-color);box-shadow:0 0 0 5px var(--status-bg);flex:0 0 auto}
.status-percent{font-size:42px;line-height:1;font-weight:950;letter-spacing:-.04em;color:var(--status-color);margin-bottom:16px}
.status-percent small{font-size:18px;font-weight:850;margin-inline-start:2px}
.status-track{height:9px;border-radius:999px;background:var(--neutral-bg);overflow:hidden;box-shadow:inset 0 1px 2px rgba(15,23,42,.05)}
.status-fill{height:100%;border-radius:999px;width:0;transition:width 1s var(--ease-out);background:linear-gradient(90deg,var(--status-color),color-mix(in srgb,var(--status-color) 55%,#fff))}

/* completion rate */
.completion-wrap{display:flex;flex-direction:column;gap:14px}
.completion-top{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.completion-num{font-size:56px;font-weight:950;letter-spacing:-.04em;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.completion-num small{font-size:24px;font-weight:850;margin-inline-start:2px}
.completion-sub{font-size:12px;color:var(--muted);font-weight:700}
.completion-bar{height:12px;border-radius:999px;background:#E8EEF7;overflow:hidden;box-shadow:inset 0 1px 3px rgba(24,85,164,.10),0 1px 2px rgba(255,255,255,.6)}
.completion-fill{height:100%;width:0;border-radius:999px;background:var(--bar);transition:width 1.1s var(--ease-out);box-shadow:0 2px 8px rgba(24,85,164,.30)}

/* accordion */
.breakdown-wrap{display:flex;flex-direction:column;gap:12px}
.acc{border:1px solid var(--border);border-radius:var(--r-lg);background:#fff;box-shadow:var(--shadow-xs);overflow:hidden;transition:box-shadow var(--t) var(--ease),border-color var(--t) var(--ease);opacity:0;animation:fadeUp var(--t-slow) var(--ease-out) forwards}
.acc.open{box-shadow:var(--shadow-md);border-color:var(--secondary)}
.acc-head{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;user-select:none;transition:background var(--t-fast) var(--ease)}
.acc-head:hover{background:#F7FAFE}
.bd-dot{width:10px;height:34px;border-radius:999px;background:var(--accent);flex:0 0 auto}
.bd-name{font-size:14px;font-weight:850;color:var(--primary-dark);line-height:1.2;text-align:start}
.bd-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:700;text-align:start}
.bd-right{margin-inline-start:auto;display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.bd-pill{border:1px solid var(--border);background:#F8FAFE;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:850;color:var(--neutral);white-space:nowrap}
.bd-pill b{color:var(--primary-dark)}
.bd-toggle{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);transition:transform var(--t) var(--ease-out);flex:0 0 auto}
.acc.open .bd-toggle{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;opacity:0;transform:translateY(-6px);transition:max-height var(--t-slow) var(--ease),opacity var(--t) var(--ease),transform var(--t) var(--ease)}
.acc.open .acc-body{opacity:1;transform:translateY(0)}
.bd-inner{padding:14px 18px 18px;border-top:1px solid #EDF1F8}
/* compact KPI rows (shared style) */
.kpi-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.kpi-cell{background:#F8FAFE;border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 12px;position:relative;overflow:hidden;transition:transform var(--t-fast) var(--ease-out)}
.kpi-cell:hover{transform:translateY(-2px)}
.kpi-cell::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--kc,var(--primary))}
body.ar .kpi-cell::before{left:auto;right:0}
.kpi-label{font-size:9px;color:var(--muted);font-weight:850;text-transform:uppercase;letter-spacing:.03em;line-height:1.3}
.kpi-val{font-size:19px;font-weight:950;color:var(--primary-dark);margin-top:6px;letter-spacing:-.02em}
.kpi-val small{font-size:11px;font-weight:850}
.kpi-val.sm{font-size:13px;margin-top:8px}
.acc-bar{height:10px;border-radius:999px;background:#E8EEF7;overflow:hidden;margin-top:14px;box-shadow:inset 0 1px 2px rgba(24,85,164,.10)}
.acc-bar-fill{height:100%;width:0;border-radius:999px;background:var(--bar);transition:width 1s var(--ease-out)}

/* feature tracker header */
.category-hero{background:var(--grad);border-radius:var(--r-xl);padding:24px;margin-bottom:16px;color:#fff;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.category-hero::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.10);top:-120px;right:-80px}
body.ar .category-hero::before{right:auto;left:-80px}
.ch-top{position:relative;z-index:1;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.ch-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:#fff;flex:0 0 auto}
.category-hero h2{font-size:25px;font-weight:950;letter-spacing:-.03em;line-height:1.15}
.ch-cat-sub{font-size:11px;color:#D6E3F5;font-weight:700;margin-top:4px}
.category-summary{position:relative;z-index:1;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
.cs-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:var(--r-md);padding:13px;position:relative;overflow:hidden;backdrop-filter:blur(6px);transition:transform var(--t-fast) var(--ease-out);opacity:0;animation:fadeUp var(--t-slow) var(--ease-out) forwards}
.cs-card:hover{transform:translateY(-3px)}
.cs-card::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--csc)}
body.ar .cs-card::before{left:auto;right:0}
.cs-label{font-size:9px;color:#CFE0F4;font-weight:850;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px;line-height:1.2}
.cs-val{font-size:22px;font-weight:950;color:#fff;margin-top:7px;letter-spacing:-.02em}
.cs-val small{font-size:12px}

/* filters */
.filters{position:sticky;top:calc(var(--topbar-h) + 10px);z-index:40;display:none;align-items:center;gap:10px;background:rgba(255,255,255,.62);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow-sm);border-radius:var(--r-lg);padding:12px;margin-bottom:16px;flex-wrap:wrap}
.filters.show{display:flex;animation:fadeUp var(--t) var(--ease-out) both}
.search{position:relative;flex:1 1 240px;min-width:200px;transition:flex-grow var(--t-slow) var(--ease-out)}
.search:focus-within{flex-grow:2.4}
.search input{width:100%;height:42px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.92);padding:0 14px 0 40px;outline:none;color:var(--text);font-weight:650;transition:border-color var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}
body.ar .search input{padding:0 40px 0 14px}
.search input:focus{border-color:var(--secondary);box-shadow:0 0 0 4px rgba(24,85,164,.12)}
.search .icon-wrap{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);transition:color var(--t-fast) var(--ease)}
body.ar .search .icon-wrap{left:auto;right:13px}
.search:focus-within .icon-wrap{color:var(--primary)}
.filters select{height:42px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.92);color:var(--neutral);padding:0 12px;font-weight:750;outline:none;transition:border-color var(--t-fast) var(--ease)}
.filters select:focus{border-color:var(--secondary)}

/* empty states */
.empty{min-height:340px;display:grid;place-items:center;background:rgba(255,255,255,.6);border:1px dashed var(--border);border-radius:var(--r-xl);text-align:center;padding:40px;color:var(--muted);animation:fadeUp var(--t-slow) var(--ease-out) both}
.empty-illustration{width:120px;height:120px;margin:0 auto 18px}
.empty h3{font-size:16px;color:var(--primary-dark);margin-bottom:7px;font-weight:850}
.empty p{font-size:12.5px;line-height:1.7;max-width:360px;margin:0 auto}

/* feature cards */
.feature-list{display:flex;flex-direction:column;gap:10px}
.feature-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px;display:grid;grid-template-columns:minmax(220px,1.5fr) minmax(190px,1fr) minmax(220px,.95fr);gap:16px;align-items:center;box-shadow:var(--shadow-xs);position:relative;overflow:hidden;transition:transform var(--t) var(--ease-out),box-shadow var(--t) var(--ease-out),border-color var(--t) var(--ease);opacity:0;animation:fadeUp var(--t-slow) var(--ease-out) forwards;will-change:transform}
.feature-card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--status);transition:background var(--t) var(--ease)}
body.ar .feature-card::before{left:auto;right:0}
.feature-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:var(--secondary)}
.fc-title{display:flex;gap:12px;align-items:flex-start;min-width:0}
.fc-id{background:var(--primary-soft);color:var(--primary);border-radius:999px;padding:5px 9px;font-family:ui-monospace,Menlo,monospace;font-size:10px;font-weight:900;white-space:nowrap;flex:0 0 auto}
.fc-names{min-width:0}
.fc-main{font-size:13px;font-weight:900;color:var(--primary-dark);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-sub{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 10px;font-size:10px;font-weight:850;border:1px solid transparent;white-space:nowrap}
.badge .icon{width:12px;height:12px}
.fc-actions{display:flex;align-items:center;justify-content:flex-end;gap:9px;flex-wrap:wrap}
.status-select{height:36px;border-radius:11px;border:1px solid var(--status-border);background:var(--status-bg);color:var(--status-color);font-size:11px;font-weight:900;min-width:152px;padding:0 10px;transition:background var(--t) var(--ease),color var(--t) var(--ease),border-color var(--t) var(--ease),box-shadow var(--t-fast) var(--ease)}
.status-select.flash{box-shadow:0 0 0 4px color-mix(in srgb,var(--status-color) 25%,transparent)}

<main class="layout">
  <aside class="category-sidebar">
    <div class="side-head" data-ic="folder"><span class="side-title" data-i18n="categories">Categories</span></div>
    <div class="cat-list" id="categoryList"></div>
  </aside>

  <section class="content">
    <!-- DASHBOARD -->
    <section class="view active" id="dashboardView">
      <div class="report-dashboard">
        <section class="report-section" id="overallSection">
          <div class="report-section-head">
            <span class="section-ic" data-ic="dashboard"></span>
            <h2 class="report-title" data-i18n="overallStatus">Overall Status</h2>
            <div class="report-meta">
              <span class="meta-chip" data-ic="layers" id="overallTotalChip">0</span>
              <button class="primary-btn rippleable" id="pdfBtn" onclick="exportPDF()" data-ic="download"><span data-i18n="exportPdf">Export PDF</span></button>
            </div>
          </div>
          <div class="section-body"><div class="status-card-grid" id="overallStatusCards"></div></div>
        </section>

        <section class="report-section" id="completionSection">
          <div class="report-section-head"><span class="section-ic" data-ic="gauge"></span><h2 class="report-title" data-i18n="completionRate">Completion Rate</h2></div>
          <div class="section-body"><div class="completion-wrap">
            <div class="completion-top"><div class="completion-num"><span data-count="0">0</span><small>%</small></div><div class="completion-sub" id="completionSub"></div></div>
            <div class="completion-bar"><div class="completion-fill" id="completionFill" data-w="0"></div></div>
          </div></div>
        </section>

        <section class="report-section" id="phasesSection">
          <div class="report-section-head"><span class="section-ic" data-ic="layers"></span><h2 class="report-title" data-i18n="phaseProgress">Phase Progress</h2></div>
          <div class="section-body"><div class="breakdown-wrap" id="phaseBreakdown"></div></div>
        </section>

        <section class="report-section" id="categoriesSection">
          <div class="report-section-head"><span class="section-ic" data-ic="folder"></span><h2 class="report-title" data-i18n="categoryProgress">Category Progress</h2></div>
          <div class="section-body"><div class="breakdown-wrap" id="categoryBreakdown"></div></div>
        </section>
      </div>
    </section>

    <!-- FEATURE TRACKER -->
    <section class="view" id="trackerView">
      <div class="category-hero" id="categoryHero">
        <div class="ch-top"><span class="ch-ic" data-ic="folder"></span><div><h2 id="selectedCategoryTitle">All Features</h2><div class="ch-cat-sub" id="selectedCategorySub"></div></div></div>
        <div class="category-summary" id="categorySummary"></div>
      </div>
      <div class="filters" id="filters">
        <div class="search"><span class="icon-wrap" data-ic="search"></span><input id="searchInput" oninput="renderFeatures()" placeholder="Search features..." /></div>
        <select id="phaseFilter" onchange="renderFeatures()"></select>
        <select id="priorityFilter" onchange="renderFeatures()"></select>
        <select id="statusFilter" onchange="renderFeatures()"></select>
      </div>
      <div class="feature-list" id="featureList"></div>
    </section>

    <!-- ACTIVITY -->
    <section class="view" id="activityView">
      <div class="panel">
        <div class="panel-head"><span class="section-ic" data-ic="activity"></span><div class="panel-title" data-i18n="activityLog">Activity Log</div>
          <div class="act-filter"><input type="date" id="activityDate" onchange="renderActivity()" /><button class="icon-btn rippleable" onclick="clearActivityDate()" data-ic="x"><span data-i18n="clear">Clear</span></button></div>
        </div>
        <div id="activityList"></div>
      </div>
    </section>
  </section>
</main>
</div>

<div class="overlay" id="notesOverlay" onclick="closeNotesOutside(event)">
  <aside class="notes-panel" onclick="event.stopPropagation()">
    <div class="panel-top">
      <div class="panel-top-row">
        <h3><span data-ic="note"></span><span data-i18n="featureNotes">Feature Notes</span></h3>
        <button class="close-btn rippleable" onclick="closeNotes()" data-ic="x"></button>
      </div>
      <div class="feature-mini" id="noteFeatureMini"></div>
    </div>
    <div class="note-add">
      <textarea id="noteText" placeholder="Write a note..."></textarea>
      <button class="save-btn rippleable" onclick="saveNote()"><span data-ic="check"></span><span data-i18n="saveNote">Save Note</span></button>
    </div>
    <div class="history"><div class="history-head"><h4 id="historyTitle">Notes History</h4></div><div id="notesHistory"></div></div>
  </aside>
</div>

function recomputeMain(m){const c=statCounts(m.subFeatures||[]);m.completionRate=c.comp;m.calculatedStatus=mainStatus(m);return c;}
function reindex(){for(const k in BY_ID)delete BY_ID[k];DATA.mains.forEach(m=>{BY_ID[m.featureId]=m;(m.subFeatures||[]).forEach(s=>BY_ID[s.featureId]=s);});}

/* ---------- Helpers ---------- */
function tr(k){return STR[lang][k]||k;}
function catLabel(c){return lang==='ar'?(CAT_AR[c]||c):c;}
function phaseLabel(p){return p?(lang==='ar'?(PHASE_AR[p]||p):p):'—';}
function statusText(s){return s?(lang==='ar'?(STATUS[s]?.ar||s):s):'—';}
function statusMeta(s){return STATUS[s]||{color:'#64748B',bg:'#F1F5F9',border:'#E2E8F0',ar:s||'—'};}
function nameOf(o){return (lang==='ar'?(o.arabicName||o.englishName):(o.englishName||o.arabicName))||'';}
function catNames(){return[...new Set(DATA.mains.map(m=>m.category))];}
function mainsIn(cat){return cat==='All Features'?DATA.mains:DATA.mains.filter(m=>m.category===cat);}
/* A row counts as a Sub-Feature ONLY if its Level is Sub/SubFeature (or Level
   is blank but it has a Parent_Feature_ID). Main Features and every kind of
   header row (Section / Category / Phase / Group) are excluded from the count. */
function isSubFeatureLevel(f){
  const l=String(f.level||'').trim().toLowerCase();
  return l==='sub'||l==='subfeature'||l==='detailedrequirement'||l==='requirement'||(l===''&&String(f.parentFeatureId||'').trim()!=='');
}
function isFalseValue(v){return String(v).trim().toLowerCase()==='false'||String(v).trim()==='0'||String(v).trim().toLowerCase()==='no';}
function isCountableItem(f){return isSubFeatureLevel(f) && !isFalseValue(f.isCountable);}
function isHiddenItem(f){return String(f.isHidden).toLowerCase()==='true'||String(f.isHidden)==='1'||f.status==='Not Used';}
function isSubFeature(f){return isCountableItem(f) && !isHiddenItem(f) && CANON.includes(f.status);}
function subsOf(m){return (m.subFeatures||[]).filter(isSubFeature);}
function displaySubsOf(m){return (m.subFeatures||[]).filter(isSubFeatureLevel);}
function allSubs(){return DATA.mains.flatMap(subsOf);}
function pct(c,t){return t?Math.round((c/t)*10000)/100:0;}
function fmtPct(v){return (Math.round(v*100)/100).toString();}
function num(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function statCounts(subs){const t=subs.filter(s=>CANON.includes(s.status));
  const a=t.filter(s=>s.status==='Available').length,p=t.filter(s=>s.status==='Partially Available').length,n=t.filter(s=>s.status==='Not Available').length,v=t.filter(s=>s.status==='Not Verified').length;
  return{total:t.length,available:a,partial:p,na:n,nv:v,comp:t.length?Math.round((a*100+p*50)/t.length*100)/100:0};}
function mainComp(m){return statCounts(subsOf(m)).comp;}   /* (Available*100 + Partial*50) / total */
function mainStatus(m){const t=subsOf(m).filter(s=>CANON.includes(s.status));
  if(!t.length)return (m.status&&CANON.includes(m.status))?m.status:'Not Verified';
  const a=t.filter(s=>s.status==='Available').length,p=t.filter(s=>s.status==='Partially Available').length,n=t.filter(s=>s.status==='Not Available').length,v=t.filter(s=>s.status==='Not Verified').length;
  if(a===t.length)return'Available';                       // 100% Available
  if(a===0&&p===0&&n===t.length)return'Not Available';     // 0% + all Not Available
  if(a===0&&p===0&&v===t.length)return'Not Verified';      // 0% + all Not Verified
  return'Partially Available';}                              // any mixed result
function mainCountsBy(list){const st=list.map(m=>mainStatus(m));const total=st.length,
  a=st.filter(x=>x==='Available').length,p=st.filter(x=>x==='Partially Available').length,n=st.filter(x=>x==='Not Available').length,v=st.filter(x=>x==='Not Verified').length;
  return{total,available:a,partial:p,na:n,nv:v,comp:total?Math.round((a*100+p*50)/total*100)/100:0};}
function notesFor(id){if(mode==='offline')return [...(userNotes[id]||[]),...(OFFLINE_NOTES[id]||[])];return DATA.notes[id]||[];}
function today(){const d=new Date();return{date:d.toISOString().slice(0,10),time:d.toTimeString().slice(0,8)};}

/* ---------- Ripple / animations ---------- */
document.addEventListener('pointerdown',e=>{const t=e.target.closest('.rippleable');if(!t)return;
  const r=t.getBoundingClientRect(),size=Math.max(r.width,r.height),s=document.createElement('span');
  s.className='ripple';s.style.width=s.style.height=size+'px';s.style.left=(e.clientX-r.left-size/2)+'px';s.style.top=(e.clientY-r.top-size/2)+'px';
  t.appendChild(s);setTimeout(()=>s.remove(),560);});
function animateCounts(scope){(scope||document).querySelectorAll('[data-count]').forEach(el=>{if(el.dataset.done==='1')return;el.dataset.done='1';
  const target=parseFloat(el.dataset.count)||0,dec=el.dataset.dec==='1',dur=720,t0=performance.now();
  (function step(t){const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3),v=target*e;el.textContent=dec?fmtPct(Math.round(v*100)/100):Math.round(v);
    if(p<1)requestAnimationFrame(step);else el.textContent=dec?fmtPct(target):Math.round(target);})(t0);});}
function animateFills(scope){requestAnimationFrame(()=>{(scope||document).querySelectorAll('[data-w]').forEach(el=>{if(el.dataset.wdone==='1')return;el.dataset.wdone='1';el.style.width=el.dataset.w+'%';});});}
function skeletonCards(n,cls){return Array(n).fill(`<div class="skeleton ${cls}"></div>`).join('');}

/* ====================================================================
   DATA LOADING
   ==================================================================== */
function boot(){
  (function(){const os=document.getElementById('overallSection'),cs=document.getElementById('completionSection');if(os&&cs&&os.parentNode&&os.previousElementSibling!==cs)os.parentNode.insertBefore(cs,os);})();
  if(USE_SHEET){mode='online';loadOnline(true);return;}
  loadOffline();              // embedded matrix is the working source; changes saved locally
}
function normalizeMains(raw){
  return (raw||[]).map(m=>{
    const out={...m,level:m.level||'MainFeature'};
    let subs=[];
    const sections=m.subSections||m.sections||[];
    if(Array.isArray(sections)&&sections.length){
      sections.forEach(sec=>{(sec.subFeatures||sec.items||[]).forEach(s=>subs.push({...s,level:s.level||'SubFeature',parentFeatureId:m.featureId,mainFeatureId:m.featureId,sectionId:sec.featureId||sec.sectionId||s.parentFeatureId,subSection:s.subSection||sec.englishName||sec.name||'',subSectionAr:s.subSectionAr||sec.arabicName||''}));});
    }else{
      (m.subFeatures||[]).forEach(s=>{subs.push({...s,level:s.level||'SubFeature',mainFeatureId:m.featureId,parentFeatureId:m.featureId,sectionId:s.sectionId||s.parentFeatureId||'',subSection:s.subSection||s.subSectionName||'',subSectionAr:s.subSectionAr||s.subSectionArabic||''});});
    }
    out.subFeatures=subs.map(x=>({...x,isCountable:!isFalseValue(x.isCountable),isHidden:String(x.isHidden).toLowerCase()==='true'||String(x.isHidden)==='1'||x.status==='Not Used'}));
    return out;
  });
}
function loadOnline(initial){
  if(initial)showLoading();
  return Promise.all([apiGet('getFeatures'),apiGet('getActivityLog')])
    .then(([f,a])=>{
      if(!f||!f.ok||!Array.isArray(f.mainFeatures))throw new Error('bad features');
      DATA.mains=normalizeMains(f.mainFeatures);
      DATA.activity=(a&&a.activity)?a.activity.map(x=>({id:x.activityId,fid:x.featureId,type:x.activityType,oldStatus:x.oldStatus,newStatus:x.newStatus,date:x.date,time:x.time})):[];
      DATA.notes={};mode='online';reindex();renderShell();
    })
    .catch(()=>{mode='error';renderShell();});
}
function loadOffline(){
  DATA.mains=JSON.parse(JSON.stringify(OFFLINE_MAINS));
  DATA.notes={};
  userNotes=JSON.parse(localStorage.getItem(LS.notes)||'{}');
  DATA.activity=JSON.parse(localStorage.getItem(LS.act)||'[]');
  const sm=JSON.parse(localStorage.getItem(LS.status)||'{}');
  DATA.mains.forEach(m=>{(m.subFeatures||[]).forEach(x=>{if(sm[x.featureId])x.status=sm[x.featureId];});recomputeMain(m);});
  mode='offline';reindex();renderShell();
}
function refreshAll(){if(mode==='online')return loadOnline(false);if(mode==='offline'){reindex();renderShell();}return Promise.resolve();}

function stateBlock(kind){

  return `<div class="state-block"><div class="state-ic">${svg('link')}</div><h3>${tr('setupTitle')}</h3><p>${tr('setupText')}</p><button class="state-btn ghost rippleable" onclick="loadOffline()">${svg('layers','icon-sm')}${tr('previewBtn')}</button></div>`;
}
function showLoading(){['featureList','activityList'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=stateBlock('loading');});

const STAT_DEFS=[{k:'Available',cnt:'available',lab:'available'},{k:'Partially Available',cnt:'partial',lab:'partial'},{k:'Not Available',cnt:'na',lab:'na'},{k:'Not Verified',cnt:'nv',lab:'nv'}];
function statusCardsHTML(s){return STAT_DEFS.map((it,i)=>{const st=statusMeta(it.k),cnt=s[it.cnt],p=pct(cnt,s.total),hl=it.k==='Available'?' highlight':'';
  return `<article class="status-card${hl}" style="--status-color:${st.color};--status-bg:${st.bg};animation-delay:${i*60}ms">
    <div class="status-card-head"><div class="status-label">${tr(it.lab)}</div><span class="status-dot"></span></div>
    <div class="status-percent"><span data-count="${p}" data-dec="1">0</span><small>%</small></div>
    <div class="status-count">${cnt} / ${s.total}</div>
    <div class="status-track"><div class="status-fill" data-w="${p}"></div></div></article>`;}).join('');}
function kpiCell(label,val,color,suf,small){return `<div class="kpi-cell" style="--kc:${color}"><div class="kpi-label">${label}</div><div class="kpi-val ${small?'sm':''}">${small?val:`<span data-count="${val}" ${suf?'data-dec="1"':''}>0</span>${suf?'<small>'+suf+'</small>':''}`}</div></div>`;}
function breakdownHTML(label,subtitle,accent,idx,pillHTML,kpiCells,comp){
  return `<div class="acc" style="--accent:${accent};animation-delay:${idx*50}ms">
    <button class="acc-head rippleable" onclick="toggleAcc(this)"><span class="bd-dot"></span>
      <div><div class="bd-name">${label}</div><div class="bd-sub">${subtitle}</div></div>
      <div class="bd-right">${pillHTML}<span class="bd-toggle">${svg('chevron','icon-sm')}</span></div></button>
    <div class="acc-body"><div class="bd-inner"><div class="kpi-grid">${kpiCells}</div><div class="acc-bar"><div class="acc-bar-fill" data-w="${comp}"></div></div></div></div></div>`;}
function toggleAcc(head){const acc=head.parentElement,body=head.nextElementSibling,open=acc.classList.toggle('open');
  if(open){body.style.maxHeight=body.scrollHeight+'px';acc.querySelectorAll('[data-count]').forEach(e=>e.dataset.done='0');animateCounts(acc);acc.querySelectorAll('[data-w]').forEach(e=>e.dataset.wdone='0');animateFills(acc);
    body.addEventListener('transitionend',function te(ev){if(ev.propertyName==='max-height'&&acc.classList.contains('open')){body.style.maxHeight='none';body.removeEventListener('transitionend',te);}});}
  else{body.style.maxHeight=body.scrollHeight+'px';requestAnimationFrame(()=>{body.style.maxHeight='0px';});}}
function paintDashboard(){const mains=DATA.mains,subs=allSubs(),s=statCounts(subs);
  document.getElementById('overallTotalChip').innerHTML=svg('layers','icon-sm')+`${mains.length} ${tr('mainFeatures')} · ${s.total} ${tr('subFeatures')}`;
  document.getElementById('completionSub').textContent=tr('');
  const cEl=document.querySelector('#completionSection [data-count]');if(cEl){cEl.dataset.count=s.comp;cEl.dataset.dec='1';cEl.dataset.done='0';}
  const cf=document.getElementById('completionFill');cf.dataset.w=s.comp;cf.dataset.wdone='0';
  document.getElementById('overallStatusCards').innerHTML=statusCardsHTML(s);
  const dashKpis=(c)=>kpiCell(tr('overallCompletion'),c.comp,'#1855A4','%')+kpiCell(tr('available')+' %',pct(c.available,c.total),'#22C55E','%')+kpiCell(tr('partial')+' %',pct(c.partial,c.total),'#F59E0B','%')+kpiCell(tr('na')+' %',pct(c.na,c.total),'#DC2626','%')+kpiCell(tr('nv')+' %',pct(c.nv,c.total),'#64748B','%');
  document.getElementById('phaseBreakdown').innerHTML=PHASES.map((p,i)=>{
    const leaves=subs.filter(x=>x.phase===p),c=statCounts(leaves),ss=PHASE_SUBSECTIONS[p]||0;
    const pill=`<span class="bd-pill">${tr('overallCompletion')}: <b>${c.comp}%</b></span>`;
    const kpis=kpiCell(tr('subSections'),ss,'#7499C8')+kpiCell(tr('subFeatures'),c.total,'#7499C8')+dashKpis(c);
    return breakdownHTML(phaseLabel(p),`${ss} ${tr('subSections')} · ${c.total} ${tr('subFeatures')}`,PHASE_ACCENT[p]||'#1855A4',i,pill,kpis,c.comp);
  }).join('');
  document.getElementById('categoryBreakdown').innerHTML=catNames().map((cat,i)=>{
    const cmains=mainsIn(cat),csubs=cmains.flatMap(subsOf),c=statCounts(csubs);
    const pill=`<span class="bd-pill">${tr('overallCompletion')}: <b>${c.comp}%</b></span>`;
    const kpis=kpiCell(tr('mainFeatures'),cmains.length,'#7499C8')+kpiCell(tr('subFeatures'),c.total,'#7499C8')+dashKpis(c);
    return breakdownHTML(catLabel(cat),`${cmains.length} ${tr('mainFeatures')} · ${c.total} ${tr('subFeatures')}`,CAT_COLORS[cat]||'#64748B',i,pill,kpis,c.comp);
  }).join('');

function execCard(m,idx){const pst=mainStatus(m),st=statusMeta(pst),comp=mainComp(m),countSubs=subsOf(m),displaySubs=displaySubsOf(m),open=openMainId===m.featureId;

        <span class="status-chip" style="background:${st.bg};color:${st.color}">${statusText(pst)}</span>
        <div class="exec-comp"><div class="exec-comp-num"><b>${comp}</b><small>%</small></div><div class="exec-comp-track"><span style="width:${comp}%;background:${st.color}"></span></div></div>
        <span class="exec-arrow">${svg('chevron')}</span></div></button>
    <div class="exec-body"${open?' style="max-height:none"':''}><div class="exec-body-inner">${groupedSubSections(displaySubs).map(sectionBlock).join('')}</div></div></div>`;}
function toggleMain(id){const card=document.getElementById('main-'+cssId(id));if(!card)return;const body=card.querySelector('.exec-body');
  if(openMainId===id){openMainId=null;collapse(card,body);return;}
  if(openMainId){const prev=document.getElementById('main-'+cssId(openMainId));if(prev)collapse(prev,prev.querySelector('.exec-body'));}
  openMainId=id;expand(card,body);if(card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'nearest'});}
function expand(card,body){card.classList.add('open');body.style.maxHeight=body.scrollHeight+'px';
  body.addEventListener('transitionend',function te(ev){if(ev.propertyName==='max-height'&&card.classList.contains('open')){body.style.maxHeight='none';body.removeEventListener('transitionend',te);}});}
function collapse(card,body){card.classList.remove('open');body.style.maxHeight=body.scrollHeight+'px';requestAnimationFrame(()=>body.style.maxHeight='0px');}
function mainNameMatch(m,q){return !q||(m.englishName||'').toLowerCase().includes(q)||(m.arabicName||'').includes(q)||(m.featureId||'').toLowerCase().includes(q)||subsOf(m).some(s=>subMatch(s,q));}
function subMatch(s,q){return !q||(s.englishName||'').toLowerCase().includes(q)||(s.arabicName||'').includes(q)||(s.featureId||'').toLowerCase().includes(q);}
function paintFeatures(){if(mode!=='online'&&mode!=='offline')return;
  const listEl=document.getElementById('featureList'),filters=document.getElementById('filters'),titleEl=document.getElementById('selectedCategoryTitle'),subEl=document.getElementById('selectedCategorySub');
  if(!selectedCategory){filters.classList.remove('show');listEl.innerHTML=emptyTrackerHTML();document.getElementById('categorySummary').innerHTML='';titleEl.textContent=tr('all');subEl.textContent='';return;}
  filters.classList.add('show');titleEl.textContent=catLabel(selectedCategory);
  const baseMains=mainsIn(selectedCategory),subs=baseMains.flatMap(subsOf),displaySubs=baseMains.flatMap(displaySubsOf),sc=statCounts(subs);
  subEl.textContent=`${baseMains.length} ${tr('features')} · ${sc.total} ${tr('subFeatures')} · ${tr('completion')} ${sc.comp}%`;
  renderCategorySummary(subs);
  const q=document.getElementById('searchInput').value.toLowerCase().trim(),ph=document.getElementById('phaseFilter').value,pr=document.getElementById('priorityFilter').value,stt=document.getElementById('statusFilter').value;
  const out=[];let idx=0;
  baseMains.forEach(m=>{const mn=mainNameMatch(m,q);
    const vis=displaySubsOf(m).filter(s=>{if(stt==='Not Used'){if(s.status!=='Not Used')return false;}else if(s.status==='Not Used')return false;if(!(ph==='All'||s.phase===ph))return false;if(!(pr==='All'||s.priority===pr))return false;if(!(stt==='All'||s.status===stt))return false;if(q&&!mn&&!subMatch(s,q))return false;return true;});
    if(!vis.length && !(mn&&q)) return;
    out.push(execCard({...m,subFeatures:vis},idx++));});
  listEl.innerHTML=out.length?out.join(''):`<div class="empty"><div><svg class="empty-illustration" viewBox="0 0 200 200" fill="none"><circle cx="90" cy="90" r="46" stroke="#DCE8F8" stroke-width="10"/><line x1="124" y1="124" x2="158" y2="158" stroke="#1855A4" stroke-width="12" stroke-linecap="round"/></svg><h3>${tr('noMatch')}</h3><p>${tr('noMatchSub')}</p></div></div>`;}
function renderFeatures(skeleton){if((mode==='online'||mode==='offline')&&skeleton&&selectedCategory){document.getElementById('filters').classList.add('show');document.getElementById('featureList').innerHTML=skeletonCards(5,'sk-row');setTimeout(paintFeatures,360);}else paintFeatures();}
function emptyTrackerHTML(){return `<div class="empty"><div><svg class="empty-illustration" viewBox="0 0 200 200" fill="none"><rect x="40" y="48" width="120" height="104" rx="16" fill="#EAF1FB"/><rect x="40" y="48" width="120" height="30" rx="15" fill="#DCE8F8"/><circle cx="56" cy="63" r="5" fill="#1855A4"/><circle cx="72" cy="63" r="5" fill="#7499C8"/><rect x="56" y="94" width="88" height="11" rx="5.5" fill="#fff"/><rect x="56" y="114" width="60" height="11" rx="5.5" fill="#fff"/><circle cx="140" cy="138" r="28" fill="#1855A4"/><path d="M132 138l6 6 12-12" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg><h3>${tr('noCatTitle')}</h3><p>${tr('noCatText')}</p></div></div>`;}

/* ====================================================================
   STATUS UPDATE  (sub → server recalculates parent)
   ==================================================================== */
function updateSubStatus(subId,newStatus){const s=BY_ID[subId];if(!s||s.status===newStatus)return;
  const prev=s.status;s.status=newStatus;
  // optimistic visual
  const row=document.getElementById('sub-'+cssId(subId));if(row){const st=statusMeta(newStatus);row.style.setProperty('--status',st.color);
    const sel=row.querySelector('.status-select');sel.style.setProperty('--status-bg',st.bg);sel.style.setProperty('--status-color',st.color);sel.style.setProperty('--status-border',st.border);sel.classList.add('flash');setTimeout(()=>sel.classList.remove('flash'),340);}
  if(mode==='online'){toast(tr('syncing'));
    apiPost({action:'updateFeatureStatus',featureId:subId,newStatus})
      .then(r=>{if(!r||!r.ok)throw 0;return loadOnline(false);})
      .then(()=>toast(tr('statusUpdated')))
      .catch(()=>{s.status=prev;toast(lang==='ar'?'تعذّر حفظ الحالة':'Update failed','error');paintFeatures();});
    return;}
  // offline preview: recalc parent locally + local activity
  const n=today();if(newStatus==='Not Used'){s.isHidden=true;}else{s.isHidden=false;}
  const parent=BY_ID[s.mainFeatureId||s.parentFeatureId];
  DATA.activity.unshift({id:'A'+String(DATA.activity.length+1).padStart(4,'0'),fid:subId,type:'Status Change',oldStatus:prev,newStatus,date:n.date,time:n.time});
  if(parent){const c=recomputeMain(parent);
    const card=document.getElementById('main-'+cssId(parent.featureId));if(card){const st=statusMeta(mainStatus(parent));card.style.setProperty('--bar',st.color);
      const chip=card.querySelector('.status-chip');if(chip){chip.textContent=statusText(mainStatus(parent));chip.style.background=st.bg;chip.style.color=st.color;}
      const cn=card.querySelector('.exec-comp-num b');if(cn)cn.textContent=c.comp;const ct=card.querySelector('.exec-comp-track span');if(ct){ct.style.width=c.comp+'%';ct.style.background=st.color;}}}
  if(selectedCategory){const subs=mainsIn(selectedCategory).flatMap(subsOf),sc=statCounts(subs);
    document.getElementById('selectedCategorySub').textContent=`${mainsIn(selectedCategory).length} ${tr('features')} · ${sc.total} ${tr('subFeatures')} · ${tr('completion')} ${sc.comp}%`;
    document.querySelectorAll('#categoryHero [data-count]').forEach(e=>e.dataset.done='0');renderCategorySummary(subs);}
  persistOffline();toast(tr('statusUpdated'));}

/* ====================================================================
   NOTES
   ==================================================================== */
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escapeAttr(s){return String(s==null?'':s).replace(/['"\\]/g,'\\$&');}
function cssId(s){return String(s).replace(/[^a-zA-Z0-9_-]/g,'_');}
function openNotes(id){currentFeatureId=id;const o=BY_ID[id];if(!o)return;
  document.getElementById('notesOverlay').classList.add('open');document.getElementById('noteText').value='';renderNotesPanel();setTimeout(()=>document.getElementById('noteText').focus(),120);
  if(mode==='online')apiGet('getNotes',{featureId:id}).then(r=>{if(r&&r.notes){DATA.notes[id]=r.notes.map(n=>({noteId:n.noteId,featureId:id,date:n.date,time:n.time,source:n.source||'User Note',note:n.note||''}));if(currentFeatureId===id)renderNotesPanel();updateNoteCount(id);}}).catch(()=>{});}
function closeNotes(){document.getElementById('notesOverlay').classList.remove('open');}
function closeNotesOutside(e){if(e.target.id==='notesOverlay')closeNotes();}
function updateNoteCount(id){const row=document.getElementById('sub-'+cssId(id));if(row){const b=row.querySelector('.note-btn span');if(b)b.textContent=notesFor(id).length||tr('featureNotes');}}
function renderNotesPanel(){const o=BY_ID[currentFeatureId];if(!o)return;const parent=o.parentFeatureId?BY_ID[o.parentFeatureId]:null;
  document.getElementById('noteFeatureMini').innerHTML=`<div class="id">${escapeHtml(o.featureId)}${parent?' · '+escapeHtml(nameOf(parent)):''}${o.phase?' · '+phaseLabel(o.phase):''}</div><div class="name">${escapeHtml(nameOf(o))}</div>`;
  const list=notesFor(currentFeatureId);document.getElementById('historyTitle').textContent=`${tr('notesHistory')} (${list.length})`;
  document.getElementById('notesHistory').innerHTML=list.length?`<div class="timeline">`+list.map((nt,i)=>{const init=(nt.source==='Initial Review');
    return `<div class="tl-item" style="animation-delay:${Math.min(i,15)*40}ms"><div class="tl-node ${init?'imp':'note'}">${svg(init?'import':'note')}</div>
     <div class="tl-card"><div class="tl-time">${svg('calendar','icon-sm')}${nt.date?escapeHtml(String(nt.date))+(nt.time?' · '+escapeHtml(String(nt.time)):''):''}<span class="src-badge ${init?'imp':''}">${init?tr('initialReview'):tr('userNote')}</span></div>
     <div class="tl-text">${escapeHtml(nt.note)}</div></div></div>`;}).join('')+`</div>`:`<div class="no-notes">${tr('noNotes')}</div>`;}
function saveNote(){const t=document.getElementById('noteText').value.trim();if(!t||!currentFeatureId){toast(tr('errorEmpty'),'error');return;}
  if(mode==='online'){toast(tr('syncing'));
    apiPost({action:'saveNote',featureId:currentFeatureId,note:t,source:'User Note'})
      .then(r=>{if(!r||!r.ok)throw 0;document.getElementById('noteText').value='';return Promise.all([apiGet('getNotes',{featureId:currentFeatureId}),apiGet('getActivityLog')]);})
      .then(([nr,ar])=>{if(nr&&nr.notes)DATA.notes[currentFeatureId]=nr.notes.map(n=>({noteId:n.noteId,featureId:currentFeatureId,date:n.date,time:n.time,source:n.source||'User Note',note:n.note||''}));
        if(ar&&ar.activity)DATA.activity=ar.activity.map(x=>({id:x.activityId,fid:x.featureId,type:x.activityType,oldStatus:x.oldStatus,newStatus:x.newStatus,date:x.date,time:x.time}));
        renderNotesPanel();renderActivity();updateNoteCount(currentFeatureId);toast(tr('noteSaved'),'note');})
      .catch(()=>toast(lang==='ar'?'تعذّر حفظ الملاحظة':'Save failed','error'));
    return;}
  const n=today();userNotes[currentFeatureId]=userNotes[currentFeatureId]||[];
  userNotes[currentFeatureId].unshift({noteId:'U'+Date.now(),featureId:currentFeatureId,date:n.date,time:n.time,source:'User Note',note:t});
  DATA.activity.unshift({id:'A'+String(DATA.activity.length+1).padStart(4,'0'),fid:currentFeatureId,type:'Note Added',note:t,date:n.date,time:n.time});
  persistOffline();document.getElementById('noteText').value='';renderNotesPanel();renderActivity();updateNoteCount(currentFeatureId);toast(tr('noteSaved'),'note');}

/* ====================================================================
   ACTIVITY LOG  (only real records; no demo data)
   ==================================================================== */
function actTs(a){return Date.parse(`${a.date} ${a.time}`)||Date.parse(a.date)||0;}
function dateKey(s){const t=Date.parse(s);if(isNaN(t))return'';const d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function clearActivityDate(){const d=document.getElementById('activityDate');if(d)d.value='';renderActivity();}
function activityTimeline(list){return `<div class="timeline">`+list.map((a,i)=>{const f=BY_ID[a.fid]||{englishName:a.fid,arabicName:''};const isStatus=a.type==='Status Change',typeLabel=isStatus?tr('statusChange'):tr('noteAdded');let desc;
  if(isStatus){const so=statusMeta(a.oldStatus),sn=statusMeta(a.newStatus);desc=`<span class="tl-status-chip" style="background:${so.bg};color:${so.color}">${statusText(a.oldStatus)}</span> → <span class="tl-status-chip" style="background:${sn.bg};color:${sn.color}">${statusText(a.newStatus)}</span>`;}
  else desc=escapeHtml(a.note||'');
  return `<div class="tl-item" style="animation-delay:${Math.min(i,12)*45}ms"><div class="tl-node ${isStatus?'':'note'}">${svg(isStatus?'activity':'note')}</div>
    <div class="tl-card"><div class="tl-time">${svg('calendar','icon-sm')}${escapeHtml(String(a.date||''))} · ${escapeHtml(String(a.time||''))} · ${typeLabel}</div>
    <div class="tl-title">${escapeHtml(nameOf(f))} <span class="fc-id">${escapeHtml(a.fid)}</span></div><div class="tl-desc">${desc}</div></div></div>`;}).join('')+`</div>`;}
function renderActivity(){if(mode!=='online'&&mode!=='offline')return;const el=document.getElementById('activityList');const sel=(document.getElementById('activityDate')||{}).value||'';
  let list=[...DATA.activity].sort((a,b)=>actTs(b)-actTs(a));if(sel)list=list.filter(a=>dateKey(a.date)===sel);
  if(!list.length){const msg=sel?tr('noActivityDate'):tr('noActivity'),sub=sel?tr('noActivityDateSub'):tr('noActivitySub');
    el.innerHTML=`<div class="empty"><div><svg class="empty-illustration" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="58" stroke="#DCE8F8" stroke-width="9"/><path d="M100 66v36l24 14" stroke="#1855A4" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/></svg><h3>${msg}</h3><p>${sub}</p></div></div>`;return;}
  el.innerHTML=activityTimeline(list);}
function refreshActivity(){if(mode==='online'){document.getElementById('activityList').innerHTML=skeletonCards(4,'sk-row');
  apiGet('getActivityLog').then(r=>{if(r&&r.activity)DATA.activity=r.activity.map(x=>({id:x.activityId,fid:x.featureId,type:x.activityType,oldStatus:x.oldStatus,newStatus:x.newStatus,date:x.date,time:x.time}));renderActivity();}).catch(()=>renderActivity());}
  else renderActivity();}
/* dev/testing only — not exposed in the UI */
function clearActivityLog(){DATA.activity=[];if(mode==='offline')persistOffline();renderActivity();return 'Activity cleared.';}

/* ====================================================================
   TOAST
   ==================================================================== */
function toast(msg,kind){const wrap=document.getElementById('toasts'),el=document.createElement('div');el.className='toast '+(kind||'');el.innerHTML=`<span class="tic">${svg(kind==='error'?'x':'check')}</span><span>${msg}</span>`;wrap.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},2400);}

/* ====================================================================
   COMMAND PALETTE
   ==================================================================== */
function openCmd(){if(mode!=='online'&&mode!=='offline')return;const o=document.getElementById('cmdOverlay');o.classList.add('open');const inp=document.getElementById('cmdInput');inp.value='';renderCmd();setTimeout(()=>inp.focus(),60);}
function closeCmd(){document.getElementById('cmdOverlay').classList.remove('open');}
function cmdOutside(e){if(e.target.id==='cmdOverlay')closeCmd();}
function buildCmdData(q){const items=[];
  DATA.mains.forEach(m=>{if(mainNameMatch(m,q))items.push({kind:'main',ic:'folder',name:nameOf(m),meta:`${m.featureId} · ${catLabel(m.category)}`,cat:m.category,mid:m.featureId});});
  DATA.mains.forEach(m=>subsOf(m).forEach(s=>{if(subMatch(s,q))items.push({kind:'sub',ic:'tracker',name:nameOf(s),meta:`${s.featureId} · ${statusText(s.status)}`,cat:s.category,mid:s.parentFeatureId,sid:s.featureId});}));
  ['All Features',...catNames()].forEach(c=>{if(!q||catLabel(c).toLowerCase().includes(q)||c.toLowerCase().includes(q))items.push({kind:'category',ic:'list',name:catLabel(c),meta:`${c==='All Features'?DATA.mains.length:mainsIn(c).length} ${tr('features')}`,cat:c});});
  return items;}
function renderCmd(){const q=document.getElementById('cmdInput').value.toLowerCase().trim();cmdItems=buildCmdData(q);cmdIndex=0;const res=document.getElementById('cmdResults');
  if(!cmdItems.length){res.innerHTML=`<div class="cmd-empty">${tr('cmdEmpty')}</div>`;return;}
  const groups={main:{label:tr('cmdFeatures'),items:[]},sub:{label:tr('cmdSubs'),items:[]},category:{label:tr('cmdCategories'),items:[]}};
  cmdItems.forEach((it,i)=>{it._i=i;groups[it.kind].items.push(it);});let html='';
  ['main','sub','category'].forEach(g=>{const grp=groups[g];if(!grp.items.length)return;
    html+=`<div class="cmd-group-label">${grp.label}</div>`+grp.items.slice(0,g==='sub'?20:14).map(it=>`<div class="cmd-item ${it._i===cmdIndex?'active':''}" data-i="${it._i}" onmouseenter="cmdHover(${it._i})" onclick="cmdSelect(${it._i})"><span class="cmd-ic">${svg(it.ic,'icon-sm')}</span><div class="cmd-main"><div class="cmd-name">${escapeHtml(it.name)}</div><div class="cmd-meta">${escapeHtml(it.meta)}</div></div><span class="cmd-kind">${grp.label}</span></div>`).join('');});
  res.innerHTML=html;}
function cmdHover(i){cmdIndex=i;document.querySelectorAll('.cmd-item').forEach(el=>el.classList.toggle('active',+el.dataset.i===i));}
function cmdMove(d){const items=document.querySelectorAll('.cmd-item');if(!items.length)return;const ids=[...items].map(el=>+el.dataset.i);let pos=ids.indexOf(cmdIndex);pos=(pos+d+ids.length)%ids.length;cmdIndex=ids[pos];items.forEach(el=>el.classList.toggle('active',+el.dataset.i===cmdIndex));const act=[...items].find(el=>+el.dataset.i===cmdIndex);if(act&&act.scrollIntoView)act.scrollIntoView({block:'nearest'});}
function cmdSelect(i){const it=cmdItems[i];if(!it)return;closeCmd();
  if(it.kind==='category'){selectCategory(it.cat);return;}
  selectedCategory=it.cat;openMainId=it.mid||null;document.querySelector('.tab-btn[data-view="trackerView"]').click();renderCategories(false);
  setTimeout(()=>{const hit=it.sid?document.getElementById('sub-'+cssId(it.sid)):document.getElementById('main-'+cssId(it.mid));
    if(hit){if(hit.scrollIntoView)hit.scrollIntoView({behavior:'smooth',block:'center'});hit.classList.add('flash-hit');setTimeout(()=>hit.classList.remove('flash-hit'),1400);}},520);}

/* ====================================================================
   FILTERS / i18n / VIEWS
   ==================================================================== */
function buildFilters(){const ph=document.getElementById('phaseFilter'),pr=document.getElementById('priorityFilter'),st=document.getElementById('statusFilter');
  ph.innerHTML=`<option value="All">${tr('allPhases')}</option>`+PHASES.map(p=>`<option value="${p}">${phaseLabel(p)}</option>`).join('');
  const pris=[...new Set(allSubs().map(s=>s.priority).filter(Boolean))].sort();
  pr.innerHTML=`<option value="All">${tr('allPriorities')}</option>`+pris.map(p=>`<option value="${escapeAttr(p)}">${escapeHtml(p)}</option>`).join('');
  st.innerHTML=`<option value="All">${tr('allStatuses')}</option>`+CANON.map(s=>`<option value="${s}">${statusText(s)}</option>`).join('');}
function i18n(){document.body.classList.toggle('ar',lang==='ar');document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.dataset.i18n));
  document.getElementById('langBtn').innerHTML=svg('globe','icon-sm')+(lang==='ar'?'English':'العربية');
  document.getElementById('searchInput').placeholder=tr('search');document.getElementById('noteText').placeholder=tr('notePlaceholder');
  document.getElementById('cmdInput').placeholder=lang==='ar'?'ابحثي في الخصائص والتصنيفات…':'Search features, sub-features, categories…';
  buildFilters();}
function toggleLang(){const app=document.getElementById('app');app.classList.add('lang-fade');setTimeout(()=>{lang=lang==='en'?'ar':'en';localStorage.setItem('ah_lang',lang);renderShell();app.classList.remove('lang-fade');},190);}
function switchView(id,btn){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(mode==='setup'||mode==='error'){fillState();return;}
  if(id==='dashboardView')renderDashboard(true);if(id==='trackerView')renderFeatures(!!selectedCategory);if(id==='activityView')refreshActivity();}

document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCmd();return;}
  const cmdOpen=document.getElementById('cmdOverlay').classList.contains('open');
  if(e.key==='Escape'){if(cmdOpen)closeCmd();else if(document.getElementById('notesOverlay').classList.contains('open'))closeNotes();}
  if(cmdOpen){if(e.key==='ArrowDown'){e.preventDefault();cmdMove(1);}if(e.key==='ArrowUp'){e.preventDefault();cmdMove(-1);}if(e.key==='Enter'){e.preventDefault();cmdSelect(cmdIndex);}}});

/* ====================================================================
   INIT
   ==================================================================== */
boot();

</script>
