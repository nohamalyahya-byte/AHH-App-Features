/* ---------- Page header ---------- */

.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
.chart-card {
  background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius);
  padding: 16px 18px 20px; box-shadow: var(--shadow-sm);
}

/* ---------- Filters ---------- */
.filters {
  background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm);
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; align-items: end;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 13px; color: var(--c-muted); }
.field select, .field input {
  padding: 9px 11px; border: 1px solid var(--c-border); border-radius: var(--radius-sm);
  background: var(--c-bg); outline: none; width: 100%;
}
.field select:focus, .field input:focus { border-color: var(--c-primary-2); background: #fff; box-shadow: 0 0 0 3px var(--c-tint); }
.field input[type="date"] { direction: ltr !important; text-align: start; }
.field input[type="date"]::-webkit-datetime-edit { direction: ltr !important; text-align: left; }
.field input[type="date"]::-webkit-datetime-edit-fields-wrapper { direction: ltr !important; }
.filters-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.check-inline { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--c-text); }
.check-inline input { width: auto; }

/* ---------- Table ---------- */
.table-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
.table-scroll { overflow-x: auto; }
table.data-table { width: 100%; border-collapse: collapse; min-width: 760px; }
.data-table th, .data-table td { padding: 12px 14px; text-align: start; border-bottom: 1px solid var(--c-border); vertical-align: top; white-space: nowrap; }
.data-table th { background: var(--c-tint); color: var(--c-primary); font-weight: 700; font-size: 14px; white-space: nowrap; }
html[lang="en"] .data-table th { font-weight: 600; }
.data-table td { font-size: 15px; }

.cell-title { font-weight: 600; min-width: 300px; max-width: 520px; white-space: normal; overflow-wrap: break-word; word-break: normal; line-height: 1.5; }
.cell-actions { white-space: nowrap; display: flex; gap: 6px; }
.row-deleted { opacity: .62; }

/* ---------- Badges ---------- */
.badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 3px 11px; border-radius: 20px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
}
.badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.badge-soft { background: var(--c-tint); color: var(--c-primary); }
.st-Completed { background: #e7f5ee; color: var(--s-completed); }
.st-Rejected { background: #fbeaea; color: var(--s-rejected); }
.st-InProgress { background: #e7f0fb; color: var(--s-progress); }
.st-UnderReview { background: #fcf1e2; color: var(--s-review); }
.st-PartiallyCompleted { background: #f0eaf9; color: var(--s-partial); }
.st-New { background: #eef1f5; color: var(--s-new); }
.pr-High { background: #fbeaea; color: var(--p-high); }
.pr-Medium { background: #fcf1e2; color: var(--p-medium); }
.pr-Low { background: #e7f5ee; color: var(--p-low); }
.notes-pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--c-border); background: var(--c-bg); cursor: pointer; font-size: 13px; color: var(--c-text);
}
.notes-pill:hover { background: var(--c-tint); }
.notes-count { background: var(--c-primary); color: #fff; border-radius: 10px; padding: 0 7px; font-size: 12px; }

/* ---------- States ---------- */
.state-box { text-align: center; padding: 56px 20px; color: var(--c-muted); }
.state-box .state-title { font-size: 18px; color: var(--c-text); margin-bottom: 6px; }
.spinner {
  width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--c-tint);
  border-top-color: var(--c-primary); animation: spin 0.8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-error { color: var(--s-rejected); }

/* ---------- Modal ---------- */
.modal-host { position: fixed; inset: 0; z-index: 60; display: flex; align-items: flex-start; justify-content: center; padding: 40px 18px; overflow-y: auto; background: rgba(15,30,55,.42); }
.modal {
  background: var(--c-surface); border-radius: var(--radius); box-shadow: var(--shadow-lg);
  width: 100%; max-width: 620px; margin: auto 0; animation: pop .16s ease;
}
.modal.modal-wide { max-width: 780px; }
@keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--c-border); }
.modal-head h2 { font-size: 20px; color: var(--c-primary); }
.modal-body { padding: 20px 22px; }
.modal-foot { padding: 16px 22px; border-top: 1px solid var(--c-border); display: flex; justify-content: flex-end; gap: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.field textarea { padding: 10px 12px; border: 1px solid var(--c-border); border-radius: var(--radius-sm); background: var(--c-bg); outline: none; width: 100%; resize: vertical; min-height: 96px; }
.field textarea:focus { border-color: var(--c-primary-2); background: #fff; box-shadow: 0 0 0 3px var(--c-tint); }
.attach-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.attach-list a { color: var(--c-primary); text-decoration: none; font-size: 14px; }
.attach-list a:hover { text-decoration: underline; }

/* ---------- Notes panel ---------- */
.notes-list { display: flex; flex-direction: column; gap: 12px; max-height: 360px; overflow-y: auto; margin-bottom: 14px; }
.note-item { border: 1px solid var(--c-border); border-radius: var(--radius-sm); padding: 12px 14px; background: var(--c-bg); }
.note-meta { display: flex; gap: 10px; flex-wrap: wrap; color: var(--c-muted); font-size: 12px; margin-bottom: 6px; }
.note-text { white-space: pre-wrap; overflow-wrap: anywhere; }

/* ---------- Settings ---------- */
.settings-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.settings-tab { padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--c-border); background: var(--c-surface); cursor: pointer; }
.settings-tab.active { background: var(--c-primary); color: #fff; border-color: transparent; }
.panel-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
.panel-card h3 { color: var(--c-primary); font-size: 18px; margin-bottom: 14px; }
.kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ---------- Toast ---------- */
.toast-host { position: fixed; bottom: 22px; inset-inline-end: 22px; z-index: 80; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--c-surface); border: 1px solid var(--c-border); border-inline-start: 4px solid var(--c-primary);
  border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 12px 16px; min-width: 240px; max-width: 360px;
  animation: slidein .2s ease;
}
.toast.ok { border-inline-start-color: var(--s-completed); }
.toast.err { border-inline-start-color: var(--s-rejected); }
@keyframes slidein { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ---------- Back to top ---------- */
.back-to-top {
  position: fixed; bottom: 22px; inset-inline-start: 22px; z-index: 50;
  width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--c-border);
  background: var(--c-surface); color: var(--c-primary); cursor: pointer; box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
}
.back-to-top:hover { background: var(--c-tint); }

/* ---------- Responsive (iPad / laptop) ---------- */
@media (max-width: 1024px) {
  #menuToggle { display: inline-flex; }
  .sidebar { transform: translateX(-100%); transition: transform .2s ease; box-shadow: var(--shadow-lg); }
  html[dir="rtl"] .sidebar { transform: translateX(100%); }
  .sidebar.open { transform: translateX(0); }
  .main-view { padding-inline-start: 24px; }
  .topbar-subtitle, .user-role { display: none; }
}
@media (max-width: 640px) {
  body { font-size: 16px; }
  .form-grid, .kv-grid { grid-template-columns: 1fr; }
  .topbar-title { max-width: 150px; }
}

/* ============================================================
   UI/UX Pro Max polish — refined corporate micro-interactions.
   Identity preserved: same blue palette (#1855A4 family) and fonts.
   Only motion, depth and on-brand tints are added/normalised.
   ============================================================ */
@keyframes pmFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes pmFadeDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
@keyframes pmFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes pmPop { from { opacity: 0; transform: translateY(8px) scale(.985); } to { opacity: 1; transform: none; } }
@keyframes pmShimmer { 0% { background-position: -480px 0; } 100% { background-position: 480px 0; } }

/* View + section entrances (run on each render) */
.page-head { animation: pmFadeDown .42s cubic-bezier(.22,.61,.36,1) both; }
.cards-grid .stat-card { animation: pmFadeUp .5s cubic-bezier(.22,.61,.36,1) both; }
.cards-grid .stat-card:nth-child(1){animation-delay:.02s}
.cards-grid .stat-card:nth-child(2){animation-delay:.06s}
.cards-grid .stat-card:nth-child(3){animation-delay:.10s}
.cards-grid .stat-card:nth-child(4){animation-delay:.14s}
.cards-grid .stat-card:nth-child(5){animation-delay:.18s}
.cards-grid .stat-card:nth-child(6){animation-delay:.22s}
.cards-grid .stat-card:nth-child(7){animation-delay:.26s}
.charts-grid .chart-card { animation: pmFadeUp .55s cubic-bezier(.22,.61,.36,1) both; }
.charts-grid .chart-card:nth-child(2){animation-delay:.05s}
.charts-grid .chart-card:nth-child(3){animation-delay:.10s}
.charts-grid .chart-card:nth-child(4){animation-delay:.15s}
.charts-grid .chart-card:nth-child(5){animation-delay:.20s}
.charts-grid .chart-card:nth-child(6){animation-delay:.25s}
.filters, .table-card, .panel-card { animation: pmFadeUp .45s cubic-bezier(.22,.61,.36,1) both; }
.data-table tbody tr { animation: pmFade .4s ease both; }
.data-table tbody tr:nth-child(1){animation-delay:.02s}
.data-table tbody tr:nth-child(2){animation-delay:.04s}
.data-table tbody tr:nth-child(3){animation-delay:.06s}
.data-table tbody tr:nth-child(4){animation-delay:.08s}
.data-table tbody tr:nth-child(5){animation-delay:.10s}
.data-table tbody tr:nth-child(6){animation-delay:.12s}
.data-table tbody tr:nth-child(7){animation-delay:.14s}
.data-table tbody tr:nth-child(8){animation-delay:.16s}
.data-table tbody tr:nth-child(9){animation-delay:.18s}
.data-table tbody tr:nth-child(10){animation-delay:.20s}

/* Depth + hover lift (on-brand shadows) */
.stat-card, .chart-card, .panel-card, .table-card { transition: transform .2s ease, box-shadow .2s ease; }
.stat-card:hover, .chart-card:hover { transform: translateY(-3px); box-shadow: 0 14px 34px rgba(24,85,164,.14); }
.stat-card.is-total:hover { box-shadow: 0 16px 40px rgba(24,85,164,.30); }

/* Buttons: lift, press, sheen, accessible focus — all blue */
.btn { transition: transform .14s ease, box-shadow .18s ease, background .15s ease, filter .15s ease; will-change: transform; }
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.985); }
.btn-primary { box-shadow: 0 6px 16px rgba(24,85,164,.22); }
.btn-primary:hover { box-shadow: 0 10px 24px rgba(24,85,164,.30); filter: saturate(1.05); }
.btn:focus-visible, .lang-link:focus-visible, .nav-item:focus-visible,
.field input:focus-visible, .field select:focus-visible, .field textarea:focus-visible {
  outline: none; box-shadow: 0 0 0 3px rgba(59,125,196,.35);
}

/* Sidebar nav: animated active bar + hover slide */
.nav-item { position: relative; transition: background .16s ease, color .16s ease, transform .16s ease, padding .16s ease; }
.nav-item:hover { transform: translateX(-3px); }
html[dir="ltr"] .nav-item:hover { transform: translateX(3px); }
.nav-item::before {
  content: ""; position: absolute; inset-inline-start: 0; top: 50%; transform: translateY(-50%) scaleY(0);
  width: 4px; height: 62%; border-radius: 4px; background: var(--c-primary-2); transition: transform .2s ease;
}
.nav-item.active::before { transform: translateY(-50%) scaleY(1); background: #fff; }
.nav-item svg { transition: transform .18s ease; }
.nav-item:hover svg { transform: scale(1.08); }

/* Inputs: smooth focus depth */
.field input, .field select, .field textarea, .login-field input { transition: border-color .15s ease, box-shadow .15s ease, background .15s ease; }

/* Modal: refined entrance + soft backdrop blur */
.modal-host { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
.modal { animation: pmPop .2s cubic-bezier(.22,.61,.36,1) both; }

/* Badges: gentle hover */
.badge { transition: transform .15s ease, box-shadow .15s ease; }
.data-table tbody tr:hover .badge { transform: translateY(-1px); }

/* Notes pill + icon buttons */
.notes-pill, .icon-btn, .settings-tab { transition: background .15s ease, transform .15s ease, box-shadow .15s ease; }
.notes-pill:hover { transform: translateY(-1px); }
.icon-btn:active { transform: scale(.92); }

/* Normalise row hover to the brand blue tint (was off-brand) */
.data-table tbody tr:hover td {
  background: var(--c-tint) !important;
}

/* Back-to-top: smoother */
.back-to-top { transition: transform .18s ease, background .15s ease, box-shadow .18s ease, opacity .2s ease; }
.back-to-top:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(24,85,164,.22); }

/* Loading shimmer helper (optional use) */
.skeleton {
  background: linear-gradient(90deg, #eef3fb 25%, #e0ebf9 37%, #eef3fb 63%);
  background-size: 480px 100%; animation: pmShimmer 1.2s linear infinite; border-radius: 8px;
}

/* Respect reduced-motion preferences */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ============================================================
   Attachments storage provider.
   Set STORAGE_PROVIDER to "drive" to store attachments on Google Drive,
   or "firebase" to use Firebase Storage. For Google Drive, fill the three
   values below from Google Cloud Console (see the Google Drive setup guide).
   ============================================================ */
const STORAGE_PROVIDER = "none";          /* "drive" or "firebase" */
const GOOGLE_API_KEY   = "";               /* Google Cloud -> Credentials -> API key */
const GOOGLE_CLIENT_ID = "";               /* Google Cloud -> Credentials -> OAuth client ID (Web) */
const DRIVE_FOLDER_ID  = "";               /* optional: a Drive folder ID to upload into ("" = My Drive) */

var _gapiReady = false, _gisReady = false, _driveTokenClient = null, _driveToken = null;

function initDrive() {
  if (STORAGE_PROVIDER !== "drive") return;
  if (typeof gapi !== "undefined") {
    gapi.load("client", function () {
      gapi.client.init({
        apiKey: GOOGLE_API_KEY,
        discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]
      }).then(function () { _gapiReady = true; });
    });
  }
  if (typeof google !== "undefined" && google.accounts && google.accounts.oauth2) {
    _driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/drive.file",
      callback: function () {}
    });
    _gisReady = true;
  }
}

function getDriveToken() {
  return new Promise(function (resolve, reject) {
    if (!_driveTokenClient) { reject(new Error("Google Drive is not configured")); return; }
    if (_driveToken) { resolve(_driveToken); return; }
    _driveTokenClient.callback = function (resp) {
      if (resp && resp.error) { reject(new Error(resp.error)); return; }
      _driveToken = resp.access_token; resolve(_driveToken);
    };
    _driveTokenClient.requestAccessToken({ prompt: "" });
  });
}

async function driveUpload(file, requestId) {
  if (!GOOGLE_CLIENT_ID || !GOOGLE_API_KEY) throw new Error(state.lang === "ar" ? "إعدادات Google Drive غير مكتملة" : "Google Drive is not configured");
  await getDriveToken();
  var metadata = { name: requestId + "_" + file.name };
  if (DRIVE_FOLDER_ID) metadata.parents = [DRIVE_FOLDER_ID];
  var form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
  form.append("file", file);
  var res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink", {
    method: "POST", headers: new Headers({ Authorization: "Bearer " + _driveToken }), body: form
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message || "Drive upload failed");
  // Make the file readable by anyone who has the link (so all staff can open it).
  try {
    await fetch("https://www.googleapis.com/drive/v3/files/" + data.id + "/permissions", {
      method: "POST",
      headers: new Headers({ Authorization: "Bearer " + _driveToken, "Content-Type": "application/json" }),
      body: JSON.stringify({ role: "reader", type: "anyone" })
    });
  } catch (e) { /* link still works for users with access */ }
  return { name: file.name, url: data.webViewLink || ("https://drive.google.com/file/d/" + data.id + "/view"), driveId: data.id, provider: "drive" };
}

/* ---------- Helpers ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const t = (k) => (I18N[state.lang][k] !== undefined ? I18N[state.lang][k] : k);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function labelFrom(list, key) {
  const item = list.find((x) => x.key === key);
  return item ? item[state.lang] : key || "";
}
function deptLabel(en, ar) { return state.lang === "ar" ? (ar || en || "") : (en || ar || ""); }
function bi(en, ar) { return state.lang === "ar" ? (ar || en || "") : (en || ar || ""); }
function statusCls(key) { const s = STATUSES.find((x) => x.key === key); return s ? s.cls : "st-New"; }
function priorityCls(key) { const p = PRIORITIES.find((x) => x.key === key); return p ? p.cls : "pr-Medium"; }

function fmtDate(ts) {
  if (!ts) return "-";
  let d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return "-";

  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();

  return `${day}/${month}/${year}`;
}
function fmtDateTime(ts) {
  if (!ts) return "-";
  let d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return "-";

  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();
  const hour = String(d.getHours()).padStart(2, "0");
  const minute = String(d.getMinutes()).padStart(2, "0");

  return `${day}/${month}/${year} ${hour}:${minute}`;
}

function toast(msg, kind = "ok") {
  const host = $("#toastHost");
  const el = document.createElement("div");
  el.className = "toast " + kind;
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; setTimeout(() => el.remove(), 250); }, 3200);
}

/* ---------- Permissions ---------- */
const isAdmin = () => state.profile && state.profile.role === ROLES.ADMINISTRATION;
const isIT = () => state.profile && state.profile.role === ROLES.IT_TEAM;
const isDM = () => state.profile && state.profile.role === ROLES.DEPARTMENT_MANAGER;

function myDepartments(){ if (state.profile && Array.isArray(state.profile.departments) && state.profile.departments.length) return state.profile.departments; return state.profile ? [state.profile.departmentEn] : []; }
function inMyDept(dep){ return myDepartments().indexOf(dep) !== -1; }
function isMultiDept(){ return isDM() && Array.isArray(state.profile.departments) && state.profile.departments.length > 1; }

function canSeeAllDepartments() { return isAdmin() || isIT(); }
function canEditRequest(req) {
  if (isAdmin() || isIT()) return true;
  if (isDM()) return inMyDept(req.departmentEn) && !req.isDeleted;
  return false;
}
function canDeleteRequest(req) {
  if (req.isDeleted) return false;
  if (isAdmin()) return true;
  if (isIT()) return !!state.profile.canDelete;
  if (isDM()) return inMyDept(req.departmentEn);
  return false;
}
function canRestoreRequest(req) {
  if (!req.isDeleted) return false;
  if (isAdmin()) return true;
  if (isIT()) return !!state.profile.canRestore;
  if (isDM()) return !!state.profile.canRestore && inMyDept(req.departmentEn);
  return false;
}
function canExport() {
  if (isAdmin() || isIT()) return true;
  if (isDM()) return !!state.profile.canExport;
  return false;
}
function canShowDeletedFilter() { return isAdmin() || isIT(); }

/* ---------- Firebase bootstrap ---------- */
function initFirebase() {
  if (!firebaseConfig || !firebaseConfig.apiKey) {
    document.body.innerHTML =
      '<div style="padding:40px;font-family:sans-serif;max-width:640px;margin:0 auto;color:#1F2937">' +
      '<h2 style="color:#1855A4">Firebase configuration required</h2>' +
      '<p>Open <strong>public/firebase-config.js</strong> and paste the values from Firebase Console &rarr; Project settings &rarr; Your apps &rarr; SDK setup and configuration.</p>' +
      '</div>';
    return false;
  }
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  storage = firebase.storage();
  return true;
}

/* ---------- Authentication ---------- */
function bindLogin() {
  $("#loginBtn").addEventListener("click", doLogin);
  $("#loginPassword").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  $("#loginLangToggle").addEventListener("click", () => applyLanguage(state.lang === "ar" ? "en" : "ar"));
}

async function doLogin() {
  const email = $("#loginEmail").value.trim();
  const pass = $("#loginPassword").value;
  const errEl = $("#loginError");
  errEl.hidden = true;
  if (!email || !pass) { errEl.textContent = state.lang === "ar" ? "أدخل البريد وكلمة المرور" : "Enter email and password"; errEl.hidden = false; return; }
  $("#loginBtn").disabled = true;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    errEl.textContent = friendlyAuthError(e.code);
    errEl.hidden = false;
  } finally {
    $("#loginBtn").disabled = false;
  }
}

function friendlyAuthError(code) {
  const m = {
    "auth/invalid-email": ["البريد الإلكتروني غير صالح", "Invalid email address"],
    "auth/user-disabled": ["الحساب موقوف", "This account is disabled"],
    "auth/user-not-found": ["بيانات الدخول غير صحيحة", "Invalid sign-in details"],
    "auth/wrong-password": ["بيانات الدخول غير صحيحة", "Invalid sign-in details"],
    "auth/invalid-credential": ["بيانات الدخول غير صحيحة", "Invalid sign-in details"],
    "auth/too-many-requests": ["محاولات كثيرة، حاول لاحقاً", "Too many attempts, try later"]
  };
  const pair = m[code] || ["تعذّر تسجيل الدخول", "Sign-in failed"];
  return state.lang === "ar" ? pair[0] : pair[1];
}

function onAuth() {
  auth.onAuthStateChanged(async (user) => {
    if (!user) { showLogin(); return; }
    try {
      const snap = await db.collection("users").doc(user.uid).get();
      if (!snap.exists || snap.data().isActive === false) {
        await auth.signOut();
        const e = $("#loginError");
        e.textContent = state.lang === "ar" ? "لا يوجد ملف مستخدم مفعّل لهذا الحساب" : "No active user profile for this account";
        e.hidden = false;
        showLogin();
        return;
      }
      state.user = user;
      state.profile = Object.assign({ uid: user.uid }, snap.data());
      db.collection("users").doc(user.uid).update({ lastLoginAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => {});
      logActivity("login", null, null, null);
      await loadSettings();
      await loadDepartments();
      enterApp();
    } catch (e) {
      const el = $("#loginError");
      el.textContent = state.lang === "ar" ? "تعذّر تحميل ملف المستخدم" : "Could not load user profile";
      el.hidden = false;
    }
  });
}

function showLogin() {
  if (state.unsubRequests) { state.unsubRequests(); state.unsubRequests = null; }
  state.user = null; state.profile = null;
  $("#appShell").hidden = true;
  $("#loginScreen").style.display = "flex";
}

/* ---------- Settings & departments loading ---------- */
async function loadSettings() {
  try {
    const doc = await db.collection("system_settings").doc("main").get();
    state.settings = doc.exists ? doc.data() : null;
  } catch (e) { state.settings = null; }
  if (state.settings && state.settings.defaultLanguage && !state._langChosen) {
    state.lang = state.settings.defaultLanguage === "en" ? "en" : "ar";
  }
}
async function loadDepartments() {
  try {
    const qs = await db.collection("departments").orderBy("en").get();
    if (!qs.empty) state.departments = qs.docs.map((d) => d.data()).filter((x) => x.active !== false);
  } catch (e) { /* fallback to built-in list */ }
}

function settingsName() {
  if (state.settings) return state.lang === "ar" ? (state.settings.systemNameAr || t("appTitle")) : (state.settings.systemNameEn || t("appTitle"));

/* ---------- Navigation ---------- */
function visibleNav() {
  return NAV.filter((n) => !n.roles || n.roles.includes(state.profile.role));
}
function renderNav() {
  const nav = $("#navMenu");
  nav.innerHTML = visibleNav().map((n) =>
    '<button class="nav-item' + (state.view === n.id ? " active" : "") + '" data-nav="' + n.id + '">' +
    '<svg viewBox="0 0 24 24" width="20" height="20">' + ICONS[n.icon] + "</svg>" +
    "<span>" + esc(t("nav_" + n.id)) + "</span></button>"
  ).join("");
  nav.querySelectorAll("[data-nav]").forEach((b) => b.onclick = () => {
    navigate(b.getAttribute("data-nav"));
    $("#sidebar").classList.remove("open"); $("#sidebarBackdrop").hidden = true;
  });
}
function navigate(view) {
  if (!visibleNav().some((n) => n.id === view)) view = "dashboard";
  state.view = view;
  renderNav();
  renderView();
}

/* ---------- Requests subscription ---------- */
function subscribeRequests() {
  if (state.unsubRequests) state.unsubRequests();
  let query = db.collection("requests");
  if (isDM()) { var _d = myDepartments(); query = (_d.length > 1) ? query.where("departmentEn", "in", _d.slice(0,30)) : query.where("departmentEn", "==", _d[0]); }
  state.unsubRequests = query.onSnapshot((qs) => {
    state.requests = qs.docs.map((d) => Object.assign({ id: d.id }, d.data()));
    state.requests.sort((a, b) => tsVal(b.createdAt) - tsVal(a.createdAt));
    if (["dashboard", "requests", "issues", "enhancements", "projects", "reports"].includes(state.view)) renderView();
  }, (err) => {
    if (["dashboard", "requests", "issues", "enhancements", "projects", "reports"].includes(state.view)) renderErrorState(err);
  });
}
function tsVal(ts) { if (!ts) return 0; const d = ts.toDate ? ts.toDate() : new Date(ts); return isNaN(d) ? 0 : d.getTime(); }

/* ---------- Filtering ---------- */
function navType() { const n = NAV.find((x) => x.id === state.view); return n ? n.type : null; }

function filteredRequests() {
  const f = state.filters;
  const fixedType = navType();
  return state.requests.filter((r) => {
    if (fixedType && r.requestType !== fixedType) return false;
    if (r.isDeleted) { if (!(canShowDeletedFilter() && f.showDeleted)) return false; }
    if (f.department && r.departmentEn !== f.department) return false;
    if (f.branch && r.branch !== f.branch) return false;
    if (f.type && r.requestType !== f.type) return false;
    if (f.status && r.status !== f.status) return false;
    if (f.priority && r.priority !== f.priority) return false;
    if (f.from && tsVal(r.createdAt) < new Date(f.from).getTime()) return false;
    if (f.to && tsVal(r.createdAt) > new Date(f.to).getTime() + 86400000) return false;
    if (f.search) {
      const hay = ((r.title || "") + " " + (r.titleAr || "") + " " + (r.details || "") + " " + (r.requestId || "")).toLowerCase();
      if (!hay.includes(f.search.toLowerCase())) return false;
    }
    return true;
  });
}

function chartCard(id, title) {

}
function destroyCharts() { state.charts.forEach((c) => { try { c.destroy(); } catch (e) {} }); state.charts = []; }

function groupCount(data, keyFn) {
  const m = new Map();
  data.forEach((r) => { const k = keyFn(r); if (k == null || k === "") return; m.set(k, (m.get(k) || 0) + 1); });
  return m;
}
function paletteBars(n) {
  const base = ["#1855A4", "#3B7DC4", "#7499C8", "#2E9E6B", "#E08A2B", "#7C5CC4", "#2F73C9", "#8A97A8", "#D24B4B", "#4FA3D1", "#9FB8DE"];
  const out = []; for (let i = 0; i < n; i++) out.push(base[i % base.length]); return out;
}
function makeChart(id, type, labels, values, colors) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const c = new Chart(ctx, {
    type: type,
    data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: type === "line" ? 2 : 0, borderColor: type === "line" ? "#1855A4" : undefined, fill: type === "line", tension: 0.3, borderRadius: type === "bar" ? 6 : 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: type === "doughnut", position: "bottom", labels: { font: { size: 12 }, boxWidth: 12 } } },
      scales: type === "doughnut" ? {} : { x: { ticks: { font: { size: 11 } } }, y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });
  state.charts.push(c);
}
function buildCharts(data, statusCounts) {
  const dep = groupCount(data, (r) => deptLabel(r.departmentEn, r.departmentAr));
  makeChart("chDept", "bar", [...dep.keys()], [...dep.values()], paletteBars(dep.size));

  const br = groupCount(data, (r) => labelFrom(BRANCHES, r.branch));
  makeChart("chBranch", "doughnut", [...br.keys()], [...br.values()], paletteBars(br.size));

  const ty = groupCount(data, (r) => labelFrom(TYPES, r.requestType));
  makeChart("chType", "bar", [...ty.keys()], [...ty.values()], paletteBars(ty.size));

  const stLabels = STATUSES.map((s) => s[state.lang]);
  const stVals = STATUSES.map((s) => statusCounts[s.key]);
  const stColors = ["#8A97A8", "#E08A2B", "#2F73C9", "#7C5CC4", "#2E9E6B", "#D24B4B"];
  makeChart("chStatus", "doughnut", stLabels, stVals, stColors);

  const pr = PRIORITIES.map((p) => p[state.lang]);
  const prVals = PRIORITIES.map((p) => data.filter((r) => r.priority === p.key).length);
  makeChart("chPriority", "bar", pr, prVals, ["#D24B4B", "#E08A2B", "#2E9E6B"]);

  const trend = new Map();
  data.forEach((r) => { const v = tsVal(r.createdAt); if (!v) return; const d = new Date(v); const k = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); trend.set(k, (trend.get(k) || 0) + 1); });
  const keys = [...trend.keys()].sort();
  makeChart("chTrend", "line", keys, keys.map((k) => trend.get(k)), "rgba(24,85,164,.15)");
}

      field("priority", "fPriority", '<select id="fPriority">' + selOptions(PRIORITIES, r ? r.priority : "Medium", false) + "</select>") +

      '<div class="field full"><label for="fDescEn">' + esc(t("descEnLbl")) + '</label><textarea id="fDescEn" dir="ltr" rows="3">' + esc(r ? (r.details || "") : "") + "</textarea></div>" +
      (STORAGE_PROVIDER === "drive" || STORAGE_PROVIDER === "firebase"
        ? '<div class="field full"><label for="fFiles">' + esc(t("attachments")) + '</label><input type="file" id="fFiles" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg">' +
          '<div class="page-sub">' + esc(t("attachHint")) + "</div>" + attachHtml + "</div>"
        : '<div class="field full"><label>' + esc(t("attachments")) + '</label><div class="attach-note">' + esc(t("attachDisabled")) + "</div>" + attachHtml + "</div>") +
    "</div>",
    [

      { label: t("save"), cls: "btn btn-primary", action: () => saveRequest(id) }

async function saveRequest(id) {
  const descAr = $("#fDescAr").value.trim();
  const descEn = $("#fDescEn").value.trim();
  if (!descAr && !descEn) { toast(t("descRequired"), "err"); return; }
  const deptEl = $("#fDept");
  let departmentEn, departmentAr;
  if (isDM() && !isMultiDept()) { departmentEn = state.profile.departmentEn; departmentAr = state.profile.departmentAr; }
  else {
    departmentEn = deptEl.value;
    const d = state.departments.find((x) => x.en === departmentEn);
    departmentAr = d ? d.ar : "";
    if (!departmentEn) { toast(state.lang === "ar" ? "اختاري القسم" : "Please choose a department", "err"); return; }
    if (isMultiDept() && !inMyDept(departmentEn)) { toast(state.lang === "ar" ? "اختاري قسماً ضمن نطاقك" : "Choose a department within your scope", "err"); return; }
  }
  const filesEl = $("#fFiles");
  const files = filesEl ? filesEl.files : [];
  for (let i = 0; i < files.length; i++) {
    const ext = files[i].name.split(".").pop().toLowerCase();
    if (!ALLOWED_FILE_EXT.includes(ext)) { toast(t("fileTypeError") + ": " + files[i].name, "err"); return; }
  }

  const payload = {
    branch: $("#fBranch").value,
    requestType: $("#fType").value,
    priority: $("#fPriority").value,
    status: $("#fStatus").value,
    title: descEn || descAr,
    titleAr: descAr || descEn,
    details: descEn || descAr,
    detailsAr: descAr || descEn,
    departmentEn: departmentEn,
    departmentAr: departmentAr,
    lastUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    lastUpdatedBy: state.user.uid
  };

  closeModal();
  try {
    let ref, isNew = !id, oldStatus = null;
    if (id) {
      const existing = state.requests.find((x) => x.id === id);
      oldStatus = existing ? existing.status : null;
      ref = db.collection("requests").doc(id);
      await ref.update(payload);
    } else {
      ref = db.collection("requests").doc();
      const seq = await nextRequestNumber();
      await ref.set(Object.assign({
        requestId: seq,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdBy: state.user.uid,
        createdByName: state.profile.displayName || state.profile.email,
        createdByRole: state.profile.role,
        attachments: [],
        noteCount: 0,
        isDeleted: false, deletedBy: null, deletedAt: null
      }, payload));
    }
    if (files.length) await uploadAttachments(ref, files);

    if (isNew) { logActivity("create_request", ref.id, null, payload.status); toast(t("saved")); }
    else {
      logActivity("update_request", ref.id, null, null);
      if (oldStatus && oldStatus !== payload.status) logActivity("change_status", ref.id, oldStatus, payload.status);
      toast(t("updated"));
    }
  } catch (e) { toast((state.lang === "ar" ? "تعذّر الحفظ: " : "Save failed: ") + e.message, "err"); }
}

async function nextRequestNumber() {
  let max = 0;
  state.requests.forEach((r) => { const m = /(\d+)/.exec(r.requestId || ""); if (m) max = Math.max(max, parseInt(m[1], 10)); });
  return "REQ-" + String(max + 1).padStart(4, "0");
}

  openModal(t("changePassword"),
    '<div class="form-grid">' +
      '<div class="field full"><label for="cpCur">' + esc(t("currentPassword")) + '</label><input type="password" id="cpCur" autocomplete="current-password"></div>' +
      '<div class="field full"><label for="cpNew">' + esc(t("newPassword")) + '</label><input type="password" id="cpNew" autocomplete="new-password"></div>' +
      '<div class="field full"><label for="cpConf">' + esc(t("confirmPassword")) + '</label><input type="password" id="cpConf" autocomplete="new-password"></div>' +
    "</div>",
    [
      { label: t("cancel"), cls: "btn btn-ghost", action: closeModal },
      { label: t("save"), cls: "btn btn-primary", action: doChangePassword }
    ]);

async function doChangePassword() {
  const cur = $("#cpCur").value;
  const np = $("#cpNew").value;
  const cf = $("#cpConf").value;
  if (np.length < 6) { toast(t("passwordShort"), "err"); return; }
  if (np !== cf) { toast(t("passwordMismatch"), "err"); return; }
  const user = auth.currentUser;
  if (!user) return;
  try {
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, cur);
    await user.reauthenticateWithCredential(cred);
    await user.updatePassword(np);
    closeModal();
    toast(t("passwordChanged"));
  } catch (e) {
    if (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") toast(t("wrongCurrent"), "err");
    else if (e.code === "auth/weak-password") toast(t("passwordShort"), "err");
    else toast(e.message, "err");
  }
}

async function uploadAttachments(ref, files) {
  if (STORAGE_PROVIDER !== "drive" && STORAGE_PROVIDER !== "firebase") return;
  const current = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (STORAGE_PROVIDER === "drive") {
      const meta = await driveUpload(file, ref.id);
      current.push(meta);
    } else {
      const path = "requests/" + ref.id + "/" + Date.now() + "_" + file.name;
      const snap = await storage.ref(path).put(file);
      const url = await snap.ref.getDownloadURL();
      current.push({ name: file.name, url: url, path: path, provider: "firebase" });
    }
  }
  await ref.update({ attachments: firebase.firestore.FieldValue.arrayUnion.apply(null, current) });
}

      });

      toast(t("deleted"));

      await db.collection("requests").doc(id).update({ isDeleted: false, deletedBy: null, deletedAt: null });

async function loadNotes(id) {
  try {
    const qs = await db.collection("requests").doc(id).collection("notes").orderBy("createdAt", "asc").get();
    const host = $("#notesList"); if (!host) return;
    if (qs.empty) { host.innerHTML = '<div class="state-box">' + esc(t("noNotes")) + "</div>"; return; }
    host.innerHTML = qs.docs.map((d) => {
      const n = d.data();
      return '<div class="note-item"><div class="note-meta"><span>' + esc(n.createdByName || "") + "</span><span>" +
        esc(deptLabel(n.departmentEn, n.departmentAr)) + "</span><span>" + esc(fmtDateTime(n.createdAt)) +
        '</span></div><div class="note-text">' + esc(bi(n.text, n.textAr)) + "</div></div>";

async function addNote(id) {
  const en = $("#noteInputEn").value.trim();

  if (!text) return;
  $("#noteInputEn").value = ""; $("#noteInputAr").value = "";

    await ref.collection("notes").add({
      text: en,
      textAr: ar,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: state.user.uid,
      createdByName: state.profile.displayName || state.profile.email,
      departmentEn: state.profile.departmentEn, departmentAr: state.profile.departmentAr,

/* ---------- Export (SheetJS) ---------- */
function exportCurrent() {
  if (!canExport()) return;
  const rows = filteredRequests();
  const headers = [
    "#", t("department"), t("branch"), t("type"), t("descCol"),
    t("priority"), t("status"), t("createdAt"), t("createdBy")
  ];
  const aoa = [headers];
  rows.forEach((r) => {
    aoa.push([
      String(r.requestId || r.id),
      deptLabel(r.departmentEn, r.departmentAr),
      labelFrom(BRANCHES, r.branch),
      labelFrom(TYPES, r.requestType),
      bi(r.title, r.titleAr),
      labelFrom(PRIORITIES, r.priority),
      labelFrom(STATUSES, r.status),
      fmtDate(r.createdAt),
      r.createdByName || ""
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, state.view);
  const stamp = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, "IT_Portal_" + state.view + "_" + stamp + ".xlsx");
  logActivity("export", null, null, state.view);
  toast(t("exported"));
}

    oldValue: oldValue == null ? null : String(oldValue),
    newValue: newValue == null ? null : String(newValue),
    userId: state.user.uid, userName: state.profile.displayName || state.profile.email,
    role: state.profile.role, departmentEn: state.profile.departmentEn, departmentAr: state.profile.departmentAr,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()

}

  const d = state.departments.find((x) => x.en === enKey);

async function saveDeptEdit(oldEn, oldAr) {
  const newEn = $("#edEn").value.trim();
  const newAr = $("#edAr").value.trim();
  if (!newEn || !newAr) return;
  if (newEn !== oldEn && state.departments.some((x) => x.en === newEn)) { toast(t("deptExists"), "err"); return; }
  closeModal();
  const enChanged = newEn !== oldEn;
  try {
    if (enChanged) toast(t("renaming"));
    // 1) departments collection: new active doc, old hidden
    await db.collection("departments").doc(newEn).set({ en: newEn, ar: newAr, active: true });
    if (enChanged) { try { await db.collection("departments").doc(oldEn).set({ active: false }, { merge: true }); } catch (e) {} }

    // 2) cascade to all requests of this department
    const rq = await db.collection("requests").where("departmentEn", "==", oldEn).get();
    let batch = db.batch(), i = 0;
    rq.forEach((doc) => { batch.update(doc.ref, { departmentEn: newEn, departmentAr: newAr }); i++; if (i % 400 === 0) { batch.commit(); batch = db.batch(); } });
    await batch.commit();

    // 3) cascade to users (single department + multi-department arrays)
    const us = await db.collection("users").get();
    for (const doc of us.docs) {
      const u = doc.data(); const upd = {};
      if (u.departmentEn === oldEn) { upd.departmentEn = newEn; upd.departmentAr = newAr; }
      if (Array.isArray(u.departments) && u.departments.indexOf(oldEn) !== -1) { upd.departments = u.departments.map((x) => (x === oldEn ? newEn : x)); }
      if (Object.keys(upd).length) await doc.ref.update(upd);
    }

    // refresh own profile labels if affected
    if (state.profile && state.profile.departmentEn === oldEn) { state.profile.departmentEn = newEn; state.profile.departmentAr = newAr; }
    if (state.profile && Array.isArray(state.profile.departments)) state.profile.departments = state.profile.departments.map((x) => (x === oldEn ? newEn : x));

    await loadDepartments();
    logActivity("settings_update", null, oldEn, newEn);
    toast(t("renamed"));
    renderDeptPanel();
  } catch (e) { toast(e.message, "err"); }
}

    '<button class="icon-btn" id="modalClose" aria-label="Close"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 5.7 18.3 4.3 16.9 10.6 12 4.3 5.7 5.7 4.3 12 10.6 16.9 4.3z"/></svg></button>' +
    '</div><div class="modal-body">' + bodyHtml + '</div><div class="modal-foot"></div></div>';

<script>
/* Dashboard Pro Max: visual number animation only. No data/state/business logic changed. */
(function(){
  const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function parseDisplayNumber(text){
    if (!text) return null;
    const clean = String(text).replace(/[^\d.-]/g, "");
    if (!clean || clean === "-" || clean === "." || clean === "-.") return null;
    const n = Number(clean);
    return Number.isFinite(n) ? n : null;
  }

  function animateNumber(el){
    if (!el || el.dataset.pmxAnimated === "1") return;
    const finalNumber = parseDisplayNumber(el.textContent);
    if (finalNumber === null) return;

    const original = el.textContent.trim();
    const hasPercent = original.includes("%");
    const hasDecimal = /\d+\.\d+/.test(original);
    const decimals = hasDecimal ? (original.match(/\d+\.(\d+)/)?.[1]?.length || 1) : 0;

    el.dataset.pmxAnimated = "1";
    el.classList.add("pmx-counting");

    if (prefersReduced){
      el.textContent = original;
      return;
    }

    const duration = 850;
    const start = performance.now();

    function frame(now){
      const p = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const value = finalNumber * eased;
      el.textContent = value.toLocaleString("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      }) + (hasPercent ? "%" : "");

      if (p < 1) requestAnimationFrame(frame);
      else el.textContent = original;
    }

    requestAnimationFrame(frame);
  }

  function run(){
    document.querySelectorAll(".stat-value, .kpi-value, .metric-value").forEach(animateNumber);
  }

  document.addEventListener("DOMContentLoaded", run);
  window.addEventListener("load", function(){ setTimeout(run, 250); });
  document.addEventListener("click", function(){ setTimeout(run, 180); }, true);
})();
</script>
